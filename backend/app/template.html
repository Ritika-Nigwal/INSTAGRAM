<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  </head>
  <body style="margin: 0; padding: 40px 16px; background-color: #f4f4f4; font-family: Arial, Helvetica, sans-serif;">

    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width: 420px; margin: 0 auto; background-color: #ffffff; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 14px rgba(0,0,0,0.08);">
      <tr>
        <td style="background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045); padding: 26px 20px; text-align: center;">
          <p style="font-family:serif;margin: 0; color: #ffffff; font-size: 20px; font-weight: bold; letter-spacing: 0.5px;">INSTAGRAM</p>
        </td>
      </tr>


      <tr>
        <td style="padding: 32px 28px; text-align: center;">

          <div style="width: 60px; height: 60px; background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045); border-radius: 50%; margin: 0 auto 18px auto; line-height: 60px;">
            <span style="color: #ffffff; font-size: 28px; font-weight: bold;">&#10003;</span>
          </div>

          <p style="margin: 0 0 6px 0; color: #1a1a1a; font-size: 19px; font-weight: bold;">
            $message
          </p>
          <p style="margin: 0 0 24px 0; color: #555555; font-size: 14px; line-height: 1.5;">
            Hey <strong>$username</strong>, your account has been created and you have logged in successfully.
          </p>

          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #fdf3f0; border-radius: 10px; padding: 14px; text-align: left; margin-bottom: 24px;">
            <tr>
              <td style="padding: 6px 10px; color: #8a4b6b; font-size: 12px;">Username</td>
              <td align="right" style="padding: 6px 10px; color: #1a1a1a; font-size: 12px; font-weight: bold;">$username</td>
            </tr>
            <tr>
              <td style="padding: 6px 10px; color: #8a4b6b; font-size: 12px;">Email</td>
              <td align="right" style="padding: 6px 10px; color: #1a1a1a; font-size: 12px; font-weight: bold;">$email</td>
            </tr>
          </table>
         

          <p style="margin: 24px 0 0 0; color: #999999; font-size: 12px; line-height: 1.5;">
            If you didn't create this account or don't recognize this login, please
            <p  style="color: #fd1d1d; text-decoration: none;">contact support</p> immediately.
          </p>

        </td>
      </tr>
    </table>

  </body>
</html>
